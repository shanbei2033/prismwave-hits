name: Build HITS Schedule

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build_hits.yml'
      - 'config/**'
      - 'data/**'
      - 'schema/**'
      - 'scripts/**'
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: UTC edition date in YYYY-MM-DD format. Defaults to the next UTC date.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-hits-schedule
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build manifests
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python scripts/build_hits.py

      - name: Commit generated manifests
        shell: bash
        run: |
          git add latest.json schedules

          if git diff --cached --quiet --exit-code; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: build HITS schedule"
          git push
